spring:
  main:
    lazy-initialization: true
    banner-mode: off

--- #################### 数据库相关配置 ####################

spring:
  datasource:
    name: laby-legal-test
    url: jdbc:h2:mem:legal-testdb;MODE=MYSQL;DATABASE_TO_UPPER=false;NON_KEYWORDS=value;
    driver-class-name: org.h2.Driver
    username: sa
    password:
    druid:
      async-init: true
      initial-size: 1
  sql:
    init:
      schema-locations: classpath:/sql/create_tables.sql
      encoding: UTF-8

mybatis-plus:
  lazy-initialization: true
  type-aliases-package: ${laby.info.base-package}.module.*.dal.dataobject

laby:
  info:
    base-package: com.laby
