--- #################### AI 模型与 Rerank（本地覆盖） ####################
#
# 本地默认关闭 Rerank，走 RRF 融合 + 降级排序（无需百炼 api-key）。
# 若要测试 Rerank，需同时开启：
#   spring.ai.model.rerank / laby.ai.model.rerank = true
#   laby.ai.knowledge-retrieval.rerank.enabled = true
#   并配置有效的 spring.ai.dashscope.api-key

spring:
  ai:
    model:
      rerank: false # 关闭 DashScope Rerank 客户端

--- #################### 芋道相关配置（AI / 法务 / 系统） ####################

# 本地环境业务配置；未写明的项继承 application.yaml 默认值
laby:
  ai:
    # ---------- 模型能力开关 ----------
    model:
      rerank: false # 与 spring.ai.model.rerank 保持一致

    # ---------- DashScope（Rerank HTTP 客户端） ----------
    # 未配置 api-key 时自动读取 spring.ai.dashscope.api-key
    dashscope:
      rerank-model: gte-rerank-v2 # Rerank 模型名，一般无需修改

    # ---------- AgentScope 对话 Agent ----------
    agentscope:
      workspace-path: ${java.io.tmpdir}/laby-agentscope # Agent 工作目录（临时文件）
      session-store: redis # 会话存储：redis | memory | workspace
      session-key-prefix: "as:" # Redis 会话 key 前缀
      audit-subagent-pilot: false # 法务审核子 Agent 试点开关
      compaction-summary-persist: true # 超长对话压缩摘要是否持久化
      history-token-budget: 32000 # 注入模型的历史 token 预算上限

    # ---------- 文档解析与结构化分块（入库） ----------
    document-parse:
      enabled: true # 是否启用 MinerU/Docling 等解析引擎
      default-engine: auto # auto | tika | mineru | docling
      mineru:
        enabled: true # PDF 等复杂文档优先 MinerU（需 Docker parse-adapter:8000）
        base-url: http://127.0.0.1:8000
        parse-path: /api/v1/parse
        timeout-ms: 300000 # 解析超时（毫秒）
      structured-chunk:
        table-row-index-enabled: true # 表格按行建索引段（利于单元格问答）
        table-summary-enabled: true # 为表格生成摘要段
        parent-backfill-enabled: true # 检索命中子段时回填父段上下文
      docling:
        enabled: true # DOC/DOCX/XLSX 等（需 Docker docling:8001）
        base-url: http://127.0.0.1:8001

    # ---------- 知识库 Universal RAG 检索 ----------
    knowledge-retrieval:
      enabled: true # 必须为 true；关闭后检索接口报错
      default-similarity-threshold: 0.60 # Rerank 分数阈值（0~1），低于此丢弃
      min-answer-score: 0.45 # 聊天「无引用守卫」最低分，低于则固定回复未命中
      no-answer-policy: strict # strict=拦截 | hint=提示 | relaxed=不拦截
      hybrid:
        enabled: true # Dense(Qdrant) + Sparse(MySQL FULLTEXT) 混合检索
        sparse-enabled: true # 是否启用 Sparse 路
      multi-query:
        enabled: true # 查询扩展（多 variant 并行检索后 RRF 融合）
        mode: rule # rule=规则扩展 | llm=LLM 改写（更慢）
      rerank:
        enabled: false # 关闭 Rerank；启用时还需 model.rerank=true + dashscope api-key

    # ---------- Qdrant 向量库（gRPC） ----------
    vector-store:
      qdrant:
        host: 127.0.0.1 # Docker: laby-qdrant
        port: 6334 # gRPC 端口（REST 为 6333）
        collection-name: knowledge_segment # 集合名，与入库一致

  # ---------- 法务合同 AI ----------
  legal:
    chat:
      max-history-turns: 8 # 合同问答注入的最大轮数
      history-token-budget: 32000 # 合同问答历史 token 上限
      max-turn-chars: 4000 # 单轮用户消息截断长度
    orchestration:
      tool-context-ttl-hours: 24 # 多合同编排 Tool 上下文 Redis TTL（小时）
    memory:
      fact-extraction-enabled: true # 是否抽取合同情节记忆
      fact-extraction-use-llm: false # false=规则抽取，true=LLM 抽取（更准更慢）
      max-appendix-items: 10 # 记忆附录条数上限
      fact-extraction-min-chars: 20 # 参与抽取的最小文本长度
    audit:
      max-concurrent-per-tenant: 5 # 每租户并行 AI 审核上限（Redis 控制）
    onlyoffice:
      enabled: true # 是否启用 OnlyOffice 在线预览/编辑
      document-server-url: http://127.0.0.1:8088/ # OnlyOffice Document Server
      jwt-secret: laby-onlyoffice-dev-secret-change-me # 与 OnlyOffice 容器 JWT 一致
      pdf-edit-enabled: false # PDF 是否允许编辑（一般仅预览）
      callback-base-url: http://host.docker.internal:48080/admin-api # DS 回调宿主机后端
      plugin-mount-on-document-server: true # 定位插件是否挂载到 DS 容器
      plugin-base-url: http://127.0.0.1:48080/admin-api # 插件静态资源/API 基址
      file-token-ttl-minutes: 15 # 文档下载临时 token 有效期（分钟）
      editor-lang: zh-CN # 编辑器语言
    format-convert:
      libre-office-enabled: false # 是否用 LibreOffice 做格式转换
      libre-office-path: soffice # soffice 可执行路径
      timeout-seconds: 120 # 转换超时（秒）

  # ---------- 系统通用（本地便捷项） ----------
  captcha:
    enable: false # 本地关闭验证码，方便 Postman/自动化登录
  security:
    mock-enable: true # 本地 Mock 登录（开发用，生产务必 false）
  pay:
    order-notify-url: https://yutou.mynatapp.cc/admin-api/pay/notify/order # 支付渠道的【支付】回调地址
    refund-notify-url: https://yutou.mynatapp.cc/admin-api/pay/notify/refund # 支付渠道的【退款】回调地址
    transfer-notify-url: https://yutou.mynatapp.cc/admin-api/pay/notify/transfer # 支付渠道的【转账】回调地址
  access-log: # 访问日志的配置项
    enable: false # 本地可关，减少日志量
  demo: false # 关闭演示模式
  wxa-code:
    env-version: develop # 小程序版本: 正式版为 "release"，体验版为 "trial"，开发版为 "develop"
  wxa-subscribe-message:
    miniprogram-state: developer # 跳转小程序类型：开发版为 "developer"，体验版为 "trial"，正式版为 "formal"
  tencent-lbs-key: TVDBZ-TDILD-4ON4B-PFDZA-RNLKH-VVF6E # QQ 地图的密钥 https://lbs.qq.com/service/staticV2/staticGuide/staticDoc

