<style data-app-loading="inject-css">
  html {
    line-height: 1.15;
  }

  .loading {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #f4f7f9;
  }

  .loading.hidden {
    visibility: hidden;
    pointer-events: none;
    opacity: 0;
    transition: all 0.8s ease-out;
  }

  .dark .loading {
    background: #0d0d10;
  }

  .loading-gif {
    width: 160px;
    height: 160px;
    object-fit: contain;
  }

  .title {
    margin-top: 24px;
    font-size: 28px;
    font-weight: 600;
    color: rgb(0 0 0 / 85%);
  }

  .dark .title {
    color: #fff;
  }
</style>
<div class="loading" id="__app-loading__">
  <img class="loading-gif" src="/loding.gif" alt="loading" />
  <div class="title">%VITE_APP_TITLE%</div>
</div>
